name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Expo
        uses: expo/setup-expo@v2

      - name: Install dependencies
        run: npm ci

      - name: Create .env for build
        run: |
          cat > .env << 'ENVEOF'
          EXPO_PUBLIC_APPWRITE_ENDPOINT=${{ secrets.EXPO_PUBLIC_APPWRITE_ENDPOINT }}
          EXPO_PUBLIC_APPWRITE_PROJECT_ID=${{ secrets.EXPO_PUBLIC_APPWRITE_PROJECT_ID }}
          EXPO_PUBLIC_APPWRITE_PROJECT_NAME=${{ secrets.EXPO_PUBLIC_APPWRITE_PROJECT_NAME }}
          EXPO_PUBLIC_APPWRITE_DATABASE_ID=${{ secrets.EXPO_PUBLIC_APPWRITE_DATABASE_ID }}
          EXPO_PUBLIC_APPWRITE_STORAGE_BUCKET_ID=${{ secrets.EXPO_PUBLIC_APPWRITE_STORAGE_BUCKET_ID }}
          ENVEOF

      - name: Build APK on EAS
        run: npx eas-cli build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}